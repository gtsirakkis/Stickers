<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed green background (safe for maskable icons) -->
  <rect width="512" height="512" fill="#0b5d3b"/>
  <!-- Soccer ball, kept within the maskable safe zone (centre ~66%) -->
  <g transform="translate(256 256)">
    <circle r="150" fill="#ffffff"/>
    <!-- central pentagon -->
    <polygon points="0,-46 44,-14 27,38 -27,38 -44,-14" fill="#12181d"/>
    <!-- outer patches -->
    <g fill="#12181d">
      <polygon points="0,-150 26,-120 0,-92 -26,-120"/>
      <polygon points="143,-46 150,-9 118,15 96,-24"/>
      <polygon points="88,124 57,148 25,120 52,86"/>
      <polygon points="-88,124 -52,86 -25,120 -57,148"/>
      <polygon points="-143,-46 -96,-24 -118,15 -150,-9"/>
    </g>
    <!-- connecting seams -->
    <g stroke="#12181d" stroke-width="7" fill="none" stroke-linecap="round">
      <line x1="0" y1="-46" x2="0" y2="-108"/>
      <line x1="44" y1="-14" x2="104" y2="-18"/>
      <line x1="27" y1="38" x2="46" y2="98"/>
      <line x1="-27" y1="38" x2="-46" y2="98"/>
      <line x1="-44" y1="-14" x2="-104" y2="-18"/>
    </g>
  </g>
</svg>
